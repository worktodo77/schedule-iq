  - id: LI-15
    name: "RSA — Rebuttal Surface Area"
    category: "LI Proprietary Indices (provocative, internal)"
    description: "An adversarial audit of a delay analysis — ours or theirs.  The attributed delay is decomposed by window and each component classified method-sensitive (the N4 sweep changes it), data-fragile (rests on records failing integrity checks — retroactive actuals, as-built anomalies, silent compression), path-ambiguous (low PCI in the window), or robust.  Run on our own draft it hardens the report before signature; run on the opposing analysis it is a cross-examination map."
    formula: "RSA = 100 × Σ delay(contested windows) ÷ Σ delay(all attributed windows), where contested = method-sensitive (window total moves > 2 wd across the N4 variants) ∪ data-fragile (window overlaps TRD-05/DAT-05/DUR-04 findings) ∪ path-ambiguous (window PCI < 0.20); each component named and its classification evidence cited; requires an N4 RobustnessCertificate with a responsibility overlay, else NOT COMPUTABLE"
    unit: percent
    threshold: null
    direction: info
    severity: info
    references:
      - "LI bespoke methodology — ANALYTICS_PROPOSAL.md §11.5 / §8.4 (N4 sweep)"
      - "AACE29R (source validation; method sensitivity)"
